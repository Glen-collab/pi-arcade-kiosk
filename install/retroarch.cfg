# Pi Arcade Kiosk — RetroArch config tuned for Pi Zero 2 W
# Heavy features off (no shaders, no rewind) to keep CPU/RAM headroom.

video_driver = "gl"
video_fullscreen = "true"
video_smooth = "false"
video_threaded = "true"
video_vsync = "true"

audio_driver = "alsa"
audio_enable = "true"
audio_sync = "true"

# Input — keyboard hotkeys for kiosk-friendly exit.
# F4 = quit. Add a controller hotkey via RetroArch's GUI once a pad is connected.
input_exit_emulator = "f4"
input_menu_toggle = "f1"
input_pause_toggle = "p"

# Controller autoconfig — udev driver + autodetect so any wired pad or
# wireless dongle maps automatically against the installed joypad profiles.
input_joypad_driver = "udev"
input_autodetect_enable = "true"
joypad_autoconfig_dir = "~/.config/retroarch/autoconfig"

# Axis threshold bumped from default 0.5 → 0.7 so the drift on cheap
# pads (NES/SNES dongle D-pads don't center perfectly) doesn't auto-
# navigate menus. MK3 mode-select was firing without input pressed.
input_axis_threshold = "0.7"

# Memory savers (Pi Zero 2 W has 512MB RAM)
rewind_enable = "false"
savestate_auto_save = "false"
savestate_auto_load = "false"

# Don't auto-load shaders or filters
video_shader_enable = "false"

# Quiet mode
notification_show_autoconfig = "false"
